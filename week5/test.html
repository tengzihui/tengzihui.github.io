<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>

    <style>
        * {
            box-sizing: border-box;
        }

        #main {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;

        }

        #main div {
            width: calc(100%/4 - 7.5px);
            height: 50px;
            background-color: rgb(229, 160, 225);
            border: 1px solid black;
            padding: 10px;
        }

        @media (max-width:1000px) {

            #main div {
                width: calc(100%/2)
            }

        }
    </style>

</head>

<body>

    <h1>The Flex-Wrap Property</h1>

    <div id="main">
        <div>A</div>
        <div>B</div>
        <div>A</div>
        <div>B</div>
        <div>A</div>
        <div>B</div>
        <div>A</div>
        <div>B</div>
        <div>A</div>
        <div>B</div>
        <div>A</div>
        <div>B</div>
    </div>

</body>

</html>
