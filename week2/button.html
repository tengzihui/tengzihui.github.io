<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise1-Button</title>

    <style>
        button.request {
            color: rgb(255, 255, 255);
            background-color: black;
            padding: 10px 20px;
            border: 1px solid;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }

        button.sign {
            color: rgb(255, 255, 255);
            background-color: rgb(41, 238, 61);
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
        }

        button.add {
            color: rgb(0, 0, 0);
            background-color: yellow;
            padding: 5px 50px;
            border-radius: 30px;
            border: 1px;
        }

        button.get {
            color: white;
            background-color: blueviolet;
            padding: 8px 10px;
            border-radius: 5px;
            border: 1px solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }

        button.download {
            color: grey;
            background-color: white;
            padding: 8px 10px;
            border-radius: 5px;
            border: 1px solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }

        button.apply {
            color: rgb(255, 255, 255);
            background-color: rgb(67, 88, 220);
            padding: 5px 30px;
            border-radius: 30px;
            border: 1px solid;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        button.save {
            color: rgb(28, 28, 234);
            border: 1px solid;
            padding: 5px 30px;
            border-radius: 30px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
    </style>

</head>

<body>
    <button class="request">Request now</button>
    <button class="sign">Sign up</button>
    <button class="add">Add to Cart</button><br>
    <p></p>
    <button class="get">Get started</button>
    <button class="download">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>

</body>

</html>
